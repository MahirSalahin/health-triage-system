services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    env_file:
      # Read the backend .env file
      - ./backend/.env
    volumes:
      # Mount directories that might change or need persistence
      - ./backend/uploads:/app/uploads
      - ./backend/report_templates:/app/report_templates

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "8501:8501"
    environment:
      # Internal Docker network URL (used by the Python code in the container to talk to the backend)
      - BACKEND_API_URL=http://backend:8000/api
    depends_on:
      - backend
